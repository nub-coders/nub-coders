name: Update GitHub Stats

on:
  schedule:
    # every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run README updater
        env:
          STATS_URL: https://nubcoder.com/stats
        run: |
          node .github/scripts/update_readme.js
